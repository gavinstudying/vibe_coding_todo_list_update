<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="auto">

  <!-- Style Definitions for Tech Industrial Vibe -->
  <style>
    .tech-base { 
      fill: none; 
      stroke: #00e5ff; /* 賽博龐克高科技青色 */
      stroke-linejoin: miter; 
      stroke-linecap: square; 
    }
    .tech-solid { 
      fill: #00e5ff; 
      stroke: none; 
    }
  </style>

  <!-- External Circuit Traces (Left & Right connectors) -->
  <g class="tech-base" stroke-width="2">
    <path d="M 12 40 H 4" />
    <path d="M 88 40 H 96" />
    <path d="M 12 65 L 4 73 V 80" />
    <path d="M 88 65 L 96 73 V 80" />
    <!-- Connector Nodes -->
    <circle cx="4" cy="40" r="1.5" class="tech-solid"/>
    <circle cx="96" cy="40" r="1.5" class="tech-solid"/>
    <circle cx="4" cy="80" r="1.5" class="tech-solid"/>
    <circle cx="96" cy="80" r="1.5" class="tech-solid"/>
  </g>

  <!-- Hexagonal Clipboard Panel with Sci-Fi Gaps -->
  <path d="M 35 15 H 22 L 12 25 V 73 M 12 80 V 85 L 22 95 H 78 L 88 85 V 37 M 88 30 V 25 L 78 15 H 65" 
        class="tech-base" stroke-width="5" />

  <!-- Clipboard Top Mechanism (Hardware Clip) -->
  <path d="M 32 5 H 68 V 18 H 32 Z" class="tech-base" stroke-width="4" />
  <rect x="38" y="9" width="24" height="2" class="tech-solid" />
  <rect x="38" y="14" width="24" height="2" class="tech-solid" />
  
  <!-- Four Corner Rivets / Screws -->
  <rect x="18" y="27" width="5" height="5" class="tech-solid" />
  <rect x="77" y="27" width="5" height="5" class="tech-solid" />
  <rect x="18" y="83" width="5" height="5" class="tech-solid" />
  <rect x="77" y="83" width="5" height="5" class="tech-solid" />

  <!-- Data / Task List Blocks (Right-aligned asymmetrical bars) -->
  <path d="M 72 35 H 80 M 60 55 H 80 M 48 75 H 80" class="tech-base" stroke-width="5" />

  <!-- Master Tech Checkmark (The Core Visual) -->
  <path d="M 23 53 L 38 70 L 65 30" class="tech-base" stroke-width="9" />
  
  <!-- Circuit Nodes at Checkmark Vertexes -->
  <rect x="19" y="49" width="8" height="8" class="tech-solid" />
  <rect x="34" y="66" width="8" height="8" class="tech-solid" />
  <rect x="61" y="26" width="8" height="8" class="tech-solid" />

  <!-- Subtle Blueprint Guide Marks -->
  <g class="tech-base" stroke-width="1" opacity="0.3">
    <line x1="25" y1="45" x2="35" y2="45" />
    <line x1="25" y1="65" x2="35" y2="65" />
    <line x1="25" y1="25" x2="75" y2="25" />
  </g>

</svg>
